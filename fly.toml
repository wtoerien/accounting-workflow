# fly.toml - Fly.io deployment configuration
# Run `fly launch --no-deploy` to create the app, then `fly deploy` to deploy.

app = "accounting-workflow"
primary_region = "syd"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/dev.db"

[[mounts]]
  source = "accounting_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Replace "accounting-workflow" with your actual app name from `fly launch`
app = "accounting-workflow"
primary_region = "syd"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # DATABASE_URL is set automatically from the mounted volume path in docker-entrypoint.sh

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source   = "accounting_data"
  destination = "/data"
  initial_size = "1gb"
